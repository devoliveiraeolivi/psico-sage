services:
  inngest:
    image: inngest/inngest:latest
    container_name: psicosage-inngest
    env_file: .env
    networks:
      - traefik-public
      - psicosage-net
    labels:
      - "traefik.enable=true"
      # Dashboard/API do Inngest acessível externamente (para debug/monitoring)
      - "traefik.http.routers.inngest.rule=Host(`${INNGEST_DOMAIN}`)"
      - "traefik.http.routers.inngest.entrypoints=websecure"
      - "traefik.http.routers.inngest.tls.certresolver=le"
      - "traefik.http.services.inngest.loadbalancer.server.port=8288"
      - "traefik.docker.network=traefik-public"
      # Proteger com basic auth (mesmo middleware do Traefik dashboard)
      - "traefik.http.routers.inngest.middlewares=inngest-auth"
      - "traefik.http.middlewares.inngest-auth.basicauth.users=${INNGEST_DASHBOARD_AUTH}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8288"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  traefik-public:
    external: true
  psicosage-net:
    external: true
