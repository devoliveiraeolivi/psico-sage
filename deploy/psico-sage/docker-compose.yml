services:
  app:
    image: ${IMAGE:-psicosage/app:latest}
    container_name: psicosage-app
    env_file: .env
    networks:
      - traefik-public
      - psicosage-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.psicosage.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.psicosage.entrypoints=websecure"
      - "traefik.http.routers.psicosage.tls.certresolver=le"
      - "traefik.http.services.psicosage.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  traefik-public:
    external: true
  psicosage-net:
    external: true
