version: "3.7"

services:
  app:
    image: ghcr.io/devoliveiraeolivi/psico-sage:latest
    env_file: .env
    networks:
      - network_swarm_public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.psicosage.rule=Host(`psico.oliveiraeolivi.cloud`)"
        - "traefik.http.routers.psicosage.entrypoints=websecure"
        - "traefik.http.routers.psicosage.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.psicosage.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  network_swarm_public:
    external: true
